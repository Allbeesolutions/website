<!DOCTYPE html>
<html lang="en-IN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Your Order — AllBee Invitations</title>
<meta name="description" content="Track your AllBee invitation order — enter your Order ID and mobile number to see status, delivery stage and downloads.">
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://www.allbeesolutions.com/track-order">
<meta name="theme-color" content="#0F7B6E">
<link rel="icon" href="/favicon.ico?v=20260524b" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--teal:#0F7B6E;--teal-d:#085A52;--gold:#DCA50C;--ink:#0F1F1F;--muted:#4A6363;--paper:#fbfaf7;--line:#e7e3da;--ok:#16A34A}
body{font-family:Lato,system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6}
a{color:inherit}
.bar{background:var(--teal-d);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.bar .b{font-family:Playfair Display,serif;font-weight:700}
.bar a{color:#eafff9;font-size:13px;text-decoration:none}
.wrap{max-width:620px;margin:0 auto;padding:36px 20px 60px}
.hd{text-align:center;margin-bottom:24px}
.hd .eb{color:var(--gold);font-weight:700;letter-spacing:3px;text-transform:uppercase;font-size:12px}
.hd h1{font-family:Playfair Display,serif;font-size:clamp(1.8rem,5vw,2.6rem);margin-top:6px}
.hd p{color:var(--muted)}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:0 14px 34px rgba(15,31,31,.06)}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
.field input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:1rem}
.field input:focus{outline:none;border-color:var(--teal)}
.btn{width:100%;background:var(--teal);color:#fff;border:none;padding:14px;border-radius:10px;font-weight:700;font-size:1rem;cursor:pointer}
.btn:hover{background:var(--teal-d)}
.err{color:#b5302a;font-size:13px;margin-top:10px;display:none}.err.show{display:block}
.hint{text-align:center;color:var(--muted);font-size:12.5px;margin-top:14px}
.result{display:none;margin-top:8px}.result.show{display:block}
.ohead{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:18px}
.ohead .oid{font-family:Playfair Display,serif;font-size:1.4rem}
.ohead .when{font-size:12px;color:var(--muted)}
.badge{display:inline-block;background:rgba(15,123,110,.1);color:var(--teal-d);font-weight:700;font-size:12px;padding:5px 12px;border-radius:100px}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-bottom:22px}
.kv .k{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.kv .v{font-weight:700}
.timeline{list-style:none;margin:8px 0 4px}
.timeline li{position:relative;padding:0 0 22px 34px}
.timeline li::before{content:"";position:absolute;left:9px;top:20px;bottom:-2px;width:2px;background:var(--line)}
.timeline li:last-child::before{display:none}
.timeline li .dot{position:absolute;left:0;top:1px;width:20px;height:20px;border-radius:50%;border:2px solid var(--line);background:#fff}
.timeline li.done .dot{background:var(--ok);border-color:var(--ok)}
.timeline li.done .dot::after{content:"✓";color:#fff;font-size:11px;position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.timeline li.cur .dot{border-color:var(--teal);box-shadow:0 0 0 4px rgba(15,123,110,.15)}
.timeline li .st{font-weight:700}
.timeline li .sd{font-size:12px;color:var(--muted)}
.timeline li.todo .st{color:var(--muted);font-weight:400}
.deliver{background:rgba(220,165,12,.08);border:1px solid rgba(220,165,12,.3);border-radius:12px;padding:16px;margin-top:8px}
.deliver h3{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:#9a6a12;margin-bottom:10px}
.deliver a{display:inline-block;background:var(--gold);color:#3a2c06;font-weight:700;text-decoration:none;padding:10px 16px;border-radius:8px;margin:4px 6px 0 0;font-size:14px}
.help{text-align:center;margin-top:22px;font-size:13px;color:var(--muted)}.help a{color:var(--teal-d);font-weight:700;text-decoration:none}
.demo-note{background:#fff7e6;border:1px solid rgba(220,165,12,.4);color:#9a6a12;font-size:12.5px;border-radius:10px;padding:10px 12px;margin-bottom:14px;text-align:center}
</style>
</head>
<body>
<div class="bar"><span class="b">AllBee Invitations</span><a href="/invitation">← Back to site</a></div>
<div class="wrap">
  <div class="hd"><span class="eb">Order Tracking</span><h1>Track your invitation</h1><p>Enter your Order ID and mobile number to see live status.</p></div>

  <div class="card" id="formCard">
    <form id="trackForm" novalidate>
      <div class="field"><label for="oid">Order ID</label><input id="oid" name="oid" placeholder="e.g. ORD-1001" autocomplete="off" required></div>
      <div class="field"><label for="mob">Mobile Number</label><input id="mob" name="mob" inputmode="tel" placeholder="The number on your order" autocomplete="off" required></div>
      <button class="btn" type="submit" id="goBtn">Track Order</button>
      <div class="err" id="err"></div>
    </form>
    <div class="hint">Your Order ID was sent to you on WhatsApp when you ordered.</div>
  </div>

  <div class="card result" id="result"></div>

  <div class="help">Can't find your order? <a href="https://wa.me/918903607506" target="_blank" rel="noopener">Message us on WhatsApp →</a></div>
</div>

<script>
(function(){
  var STAGES=['New','Designing','Review','Delivered','Completed'];
  var DESC={New:'Order received — we’re getting started.',Designing:'Our design team is crafting your invitation.',Review:'A draft is ready for your approval.',Delivered:'Your invitation has been delivered.',Completed:'All done — thank you!'};
  var form=document.getElementById('trackForm'),err=document.getElementById('err'),result=document.getElementById('result'),btn=document.getElementById('goBtn');
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];});}
  function showErr(m){err.textContent=m;err.classList.add('show');}
  function deliveryHtml(d){if(!d)return'';var parts=String(d).split(/[\s,]+/).filter(Boolean);if(!parts.length)return'';
    return '<div class="deliver"><h3>Your downloads</h3>'+parts.map(function(u,i){return '<a href="'+esc(u)+'" target="_blank" rel="noopener">Open '+(parts.length>1?('file '+(i+1)):'invitation')+' →</a>';}).join('')+'</div>';}
  function render(o,demo){
    var idx=STAGES.indexOf(o.status); if(idx<0) idx=0;
    var tl=STAGES.map(function(s,i){var cls=i<idx?'done':(i===idx?'cur':'todo');var sub=i===idx?DESC[s]:(i<idx?'':'');return '<li class="'+cls+'"><span class="dot"></span><span class="st">'+s+'</span>'+(sub?'<span class="sd">'+esc(sub)+'</span>':'')+'</li>';}).join('');
    result.innerHTML=(demo?'<div class="demo-note">Demo preview — live tracking activates once the order system is connected.</div>':'')+
      '<div class="ohead"><div><div class="oid">'+esc(o.id)+'</div><div class="when">Ordered '+esc(o.date||'—')+'</div></div><span class="badge">'+esc(o.status||'New')+'</span></div>'+
      '<div class="kv">'+
        '<div><div class="k">Event</div><div class="v">'+esc(o.event_type||'—')+'</div></div>'+
        '<div><div class="k">Package</div><div class="v">'+esc(o.package||'—')+' '+esc(o.invitation_type||'')+'</div></div>'+
        '<div><div class="k">Template</div><div class="v">'+esc(o.template_name||'—')+'</div></div>'+
        '<div><div class="k">Last update</div><div class="v">'+esc((o.updated||'').slice(0,10)||o.date||'—')+'</div></div>'+
      '</div>'+
      '<ul class="timeline">'+tl+'</ul>'+
      (idx>=3?deliveryHtml(o.delivery):'')+
      '<div class="help" style="margin-top:18px">Questions about this order? <a href="https://wa.me/918903607506?text='+encodeURIComponent('Hi AllBee, about order '+o.id)+'" target="_blank" rel="noopener">WhatsApp us →</a></div>';
    result.classList.add('show');
  }
  var DEMO={id:'ORD-1001',date:'2026-06-22',status:'Designing',event_type:'Nikah',invitation_type:'Website Invitation',package:'Premium',template_name:'Crescent Elegance',updated:'2026-06-24',delivery:''};
  form.addEventListener('submit',function(e){
    e.preventDefault();err.classList.remove('show');
    var oid=document.getElementById('oid').value.trim(),mob=document.getElementById('mob').value.trim();
    if(!oid||!mob){showErr('Please enter both your Order ID and mobile number.');return;}
    btn.disabled=true;btn.textContent='Tracking…';
    fetch('/api/track-order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({order_id:oid,mobile:mob})})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.ok&&d.order){render(d.order,false);}
        else if(d.ok&&d.configured===false){ // not wired yet → demo preview if id looks like the sample
          render(Object.assign({},DEMO,{id:oid.toUpperCase()}),true);
        } else { showErr('We couldn’t find an order with that ID and mobile number. Please check and try again, or WhatsApp us.'); }
      })
      .catch(function(){showErr('Something went wrong. Please try again in a moment.');})
      .finally(function(){btn.disabled=false;btn.textContent='Track Order';});
  });
})();
</script>
</body>
</html>
